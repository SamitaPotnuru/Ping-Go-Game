<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ping Pong Go!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Nunito', sans-serif; user-select: none; -webkit-user-select: none; }
canvas { display: block; }

/* Menu Overlay */
#menu {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #ff9a3c 0%, #f7c948 25%, #87ceeb 55%, #e8a0c8 85%, #f48fb1 100%);
}
#menu.hidden { display: none; }

.menu-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(48px, 10vw, 80px);
  color: #fff;
  text-shadow: 0 4px 0 #e67e22, 0 8px 20px rgba(0,0,0,0.15);
  margin-bottom: 8px;
  animation: titleBounce 2s ease-in-out infinite;
}
@keyframes titleBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.menu-subtitle {
  font-size: 18px; color: rgba(255,255,255,0.85); margin-bottom: 40px; font-weight: 600;
}
.menu-emoji {
  font-size: clamp(60px, 12vw, 90px);
  margin-bottom: 20px;
  animation: paddleSpin 3s ease-in-out infinite;
}
@keyframes paddleSpin {
  0%, 100% { transform: rotate(-10deg); }
  50% { transform: rotate(10deg); }
}

.difficulty-label {
  font-size: 14px; text-transform: uppercase; letter-spacing: 3px;
  color: rgba(255,255,255,0.7); margin-bottom: 14px; font-weight: 800;
}
.difficulty-buttons {
  display: flex; gap: 12px; margin-bottom: 36px; flex-wrap: wrap; justify-content: center;
}
.diff-btn {
  padding: 12px 28px; border: 3px solid rgba(255,255,255,0.5); border-radius: 50px;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
  color: #fff; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
  cursor: pointer; transition: all 0.25s; letter-spacing: 1px;
}
.diff-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
.diff-btn.selected {
  background: #fff; color: #e67e22; border-color: #fff;
  box-shadow: 0 4px 20px rgba(255,255,255,0.4);
  transform: scale(1.08);
}
.diff-btn .diff-icon { margin-right: 6px; }

.play-btn {
  padding: 18px 60px; border: none; border-radius: 60px;
  background: linear-gradient(135deg, #ff6b35, #f7c948);
  color: #fff; font-family: 'Fredoka One', cursive; font-size: 24px;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 6px 0 #c0392b, 0 10px 30px rgba(0,0,0,0.2);
  letter-spacing: 2px;
}
.play-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #c0392b, 0 14px 35px rgba(0,0,0,0.25); }
.play-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #c0392b, 0 4px 15px rgba(0,0,0,0.2); }

/* HUD */
#hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
#hud.hidden { display: none; }

.hud-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 16px 20px;
}
.hud-stars {
  display: flex; gap: 4px; margin-top: 4px;
}
.hud-star {
  width: 36px; height: 36px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  transition: all 0.4s;
}
.hud-star svg { width: 100%; height: 100%; }
.hud-star.earned svg { fill: #fbbf24; stroke: #f59e0b; }
.hud-star.empty svg { fill: rgba(255,255,255,0.3); stroke: rgba(255,255,255,0.5); }
.hud-star.earned { transform: scale(1.15); animation: starPop 0.4s ease-out; }
@keyframes starPop {
  0% { transform: scale(0.5) rotate(-20deg); }
  60% { transform: scale(1.3) rotate(5deg); }
  100% { transform: scale(1.15) rotate(0); }
}

.hud-buttons {
  display: flex; gap: 10px; pointer-events: auto;
}
.hud-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,0,0,0.25); backdrop-filter: blur(6px);
  border: 2.5px solid rgba(255,255,255,0.6);
  color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.hud-btn:hover { background: rgba(0,0,0,0.4); transform: scale(1.1); }

.hud-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: flex-end;
  padding: 20px 24px;
}
.score-badge {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,0.2); backdrop-filter: blur(8px);
  border-radius: 16px; padding: 8px 18px;
  border: 2px solid rgba(255,255,255,0.25);
}
.score-icon { font-size: 28px; }
.score-num {
  font-family: 'Fredoka One', cursive; font-size: 36px;
  color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  min-width: 50px;
}
.score-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
  color: rgba(255,255,255,0.6); font-weight: 800;
}

.diff-indicator {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  font-size: 11px; text-transform: uppercase; letter-spacing: 3px;
  color: rgba(255,255,255,0.5); font-weight: 800;
  background: rgba(0,0,0,0.15); padding: 4px 14px; border-radius: 20px;
}

/* Game Over Overlay */
#gameOver {
  position: fixed; inset: 0; z-index: 50;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
}
#gameOver.hidden { display: none; }
.go-emoji { font-size: 72px; margin-bottom: 16px; animation: titleBounce 1.5s ease-in-out infinite; }
.go-title {
  font-family: 'Fredoka One', cursive; font-size: 48px; color: #fff;
  text-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 8px;
}
.go-score {
  font-size: 20px; color: rgba(255,255,255,0.8); margin-bottom: 32px; font-weight: 700;
}
.go-buttons { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
.go-btn {
  padding: 14px 36px; border-radius: 50px; font-family: 'Nunito', sans-serif;
  font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.25s; border: none;
}
.go-btn.primary {
  background: linear-gradient(135deg, #ff6b35, #f7c948); color: #fff;
  box-shadow: 0 4px 0 #c0392b, 0 8px 20px rgba(0,0,0,0.2);
}
.go-btn.secondary {
  background: rgba(255,255,255,0.15); color: #fff; border: 2.5px solid rgba(255,255,255,0.5);
}
.go-btn:hover { transform: translateY(-2px); }

/* Combo / Streak */
#combo {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-family: 'Fredoka One', cursive; font-size: 42px; color: #fbbf24;
  text-shadow: 0 3px 10px rgba(0,0,0,0.3); pointer-events: none; z-index: 20;
  opacity: 0; transition: opacity 0.3s;
}
#combo.show { opacity: 1; animation: comboFlash 0.6s ease-out; }
@keyframes comboFlash {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

/* Particles */
.particle {
  position: fixed; width: 8px; height: 8px; border-radius: 50%;
  pointer-events: none; z-index: 30;
  animation: particleFade 0.8s ease-out forwards;
}
@keyframes particleFade {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0) translateY(-40px); }
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <div class="menu-emoji">🏓</div>
  <div class="menu-title">PING PONG GO!</div>
  <div class="menu-subtitle">Swipe to rally — first to 5 wins!</div>
  <div class="difficulty-label">Select Difficulty</div>
  <div class="difficulty-buttons">
    <button class="diff-btn" data-diff="easy"><span class="diff-icon">🟢</span> Easy</button>
    <button class="diff-btn selected" data-diff="medium"><span class="diff-icon">🟡</span> Medium</button>
    <button class="diff-btn" data-diff="hard"><span class="diff-icon">🔴</span> Hard</button>
  </div>
  <button class="play-btn" id="playBtn">PLAY</button>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-top">
    <div class="hud-stars">
      <div class="hud-star empty" id="s1"><svg viewBox="0 0 24 24" stroke-width="2"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg></div>
      <div class="hud-star empty" id="s2"><svg viewBox="0 0 24 24" stroke-width="2"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg></div>
      <div class="hud-star empty" id="s3"><svg viewBox="0 0 24 24" stroke-width="2"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg></div>
    </div>
    <div class="diff-indicator" id="diffLabel">MEDIUM</div>
    <div class="hud-buttons">
      <button class="hud-btn" id="pauseBtn" title="Pause">⏸</button>
      <button class="hud-btn" id="homeBtn" title="Menu">🏠</button>
    </div>
  </div>
  <div class="hud-bottom">
    <div class="score-badge">
      <span class="score-icon">🏆</span>
      <div>
        <div class="score-num" id="pScore">00</div>
        <div class="score-label">You</div>
      </div>
    </div>
    <div class="score-badge">
      <div style="text-align:right">
        <div class="score-num" id="cScore">00</div>
        <div class="score-label">CPU</div>
      </div>
      <span class="score-icon">💎</span>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameOver" class="hidden">
  <div class="go-emoji" id="goEmoji">🎉</div>
  <div class="go-title" id="goTitle">You Win!</div>
  <div class="go-score" id="goScore">5 — 2</div>
  <div class="go-buttons">
    <button class="go-btn primary" id="replayBtn">Play Again</button>
    <button class="go-btn secondary" id="menuBtn">Menu</button>
  </div>
</div>

<!-- COMBO -->
<div id="combo"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const menuEl = document.getElementById('menu');
const hudEl = document.getElementById('hud');
const gameOverEl = document.getElementById('gameOver');
const comboEl = document.getElementById('combo');

let W, H, dpr;
let paused = false;
let gameState = 'menu';
let difficulty = 'medium';

const DIFF = {
  easy:   { cpuSpeed: 0.03, cpuError: 40, ballAccel: 0.15, startSpeed: 4, maxSpeed: 8 },
  medium: { cpuSpeed: 0.055, cpuError: 15, ballAccel: 0.25, startSpeed: 5, maxSpeed: 11 },
  hard:   { cpuSpeed: 0.085, cpuError: 5, ballAccel: 0.35, startSpeed: 6, maxSpeed: 14 },
};

let ball, paddle, cpuPaddle, playerScore, cpuScore, streak, cpuTargetOffset;
const MAX_SCORE = 5;
let conf;
let trailPositions = [];

// Clouds
const clouds = [];
function initClouds() {
  clouds.length = 0;
  for (let i = 0; i < 10; i++) {
    clouds.push({
      x: Math.random() * (W + 200) - 100,
      y: i < 5 ? Math.random() * H * 0.35 : H * 0.65 + Math.random() * H * 0.35,
      s: 0.4 + Math.random() * 0.9,
      speed: 0.15 + Math.random() * 0.35,
      color: i < 5 ? 'rgba(255,220,150,0.25)' : 'rgba(230,160,200,0.2)'
    });
  }
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (!clouds.length) initClouds();
}
window.addEventListener('resize', resize);
resize();

function resetBall(dir) {
  conf = DIFF[difficulty];
  const sp = conf.startSpeed;
  ball = { x: W/2, y: H/2, vx: (Math.random()-0.5)*4, vy: (dir||1) * sp, r: 10 };
  streak = 0;
  cpuTargetOffset = (Math.random()-0.5) * conf.cpuError;
  trailPositions = [];
}

function initGame() {
  conf = DIFF[difficulty];
  playerScore = 0; cpuScore = 0;
  paddle = { x: W/2, y: H - 70, w: 105, h: 14 };
  cpuPaddle = { x: W/2, y: 80, w: 95, h: 12 };
  resetBall(-1);
  updateHUD();
}

function updateHUD() {
  document.getElementById('pScore').textContent = String(playerScore).padStart(2,'0');
  document.getElementById('cScore').textContent = String(cpuScore).padStart(2,'0');
  ['s1','s2','s3'].forEach((id,i) => {
    const el = document.getElementById(id);
    const threshold = difficulty === 'easy' ? [2,3,5] : difficulty === 'medium' ? [2,4,5] : [1,3,5];
    el.className = playerScore >= threshold[i] ? 'hud-star earned' : 'hud-star empty';
  });
}

function showCombo(text) {
  comboEl.textContent = text;
  comboEl.className = 'show';
  setTimeout(() => comboEl.className = '', 800);
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (x + (Math.random()-0.5)*30) + 'px';
    p.style.top = (y + (Math.random()-0.5)*20) + 'px';
    p.style.background = color;
    p.style.width = p.style.height = (4 + Math.random()*6) + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

// --- Drawing ---
function drawBg() {
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#f7a832');
  grad.addColorStop(0.3, '#f0c96e');
  grad.addColorStop(0.6, '#a8d8f0');
  grad.addColorStop(0.85, '#e8a0c8');
  grad.addColorStop(1, '#f48fb1');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

function drawClouds() {
  clouds.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y); ctx.scale(c.s, c.s);
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.arc(0,0,50,0,Math.PI*2); ctx.arc(40,-10,35,0,Math.PI*2);
    ctx.arc(-35,5,40,0,Math.PI*2); ctx.arc(20,15,30,0,Math.PI*2);
    ctx.fill(); ctx.restore();
    c.x += c.speed;
    if (c.x > W + 150) c.x = -160;
  });
}

function drawTable() {
  const tl = W*0.13, tr = W*0.87, bl = W*0.30, br = W*0.70;
  const top = H*0.20, bot = H*0.54, side = H*0.57;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.moveTo(tl-5,bot+8); ctx.lineTo(tr+5,bot+8);
  ctx.lineTo(br+5,top+8); ctx.lineTo(bl-5,top+8);
  ctx.closePath(); ctx.fill();

  // Table surface
  const tg = ctx.createLinearGradient(0,top,0,bot);
  tg.addColorStop(0,'#34d399'); tg.addColorStop(0.5,'#2dd4bf'); tg.addColorStop(1,'#06b6d4');
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.moveTo(tl,bot); ctx.lineTo(tr,bot); ctx.lineTo(br,top); ctx.lineTo(bl,top);
  ctx.closePath(); ctx.fill();

  // White border
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();

  // Center line
  ctx.beginPath();
  ctx.moveTo(W*0.5,top); ctx.lineTo(W*0.5,bot);
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Horizontal center
  const midY = (top+bot)/2;
  const midL = (tl + bl)/2, midR = (tr + br)/2;
  ctx.beginPath(); ctx.moveTo(midL, midY); ctx.lineTo(midR, midY);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1; ctx.stroke();

  // Net
  const netY = midY;
  ctx.fillStyle = 'rgba(80,80,80,0.5)';
  ctx.fillRect(midL-2, netY-2, midR-midL+4, 5);
  // Net posts
  ctx.fillStyle = '#666';
  ctx.fillRect(midL-4, netY-8, 7, 18);
  ctx.fillRect(midR-3, netY-8, 7, 18);
  // Net mesh lines
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 0.5;
  for (let nx = midL+15; nx < midR; nx += 15) {
    ctx.beginPath(); ctx.moveTo(nx, netY-2); ctx.lineTo(nx, netY+3); ctx.stroke();
  }

  // Side panel
  ctx.fillStyle = '#e0e0e0';
  ctx.beginPath();
  ctx.moveTo(tl,bot); ctx.lineTo(tr,bot); ctx.lineTo(tr,side); ctx.lineTo(tl,side);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1; ctx.stroke();
}

function drawPaddleShape(p, faceColor, rimColor, isPlayer) {
  ctx.save();
  // Handle
  const hw = 7, hh = isPlayer ? 30 : 22;
  const hy = isPlayer ? p.y + 12 : p.y - hh - 8;
  const hGrad = ctx.createLinearGradient(p.x-hw, hy, p.x+hw, hy);
  hGrad.addColorStop(0,'#a0622a'); hGrad.addColorStop(0.5,'#c47a34'); hGrad.addColorStop(1,'#a0622a');
  ctx.fillStyle = hGrad;
  roundRect(ctx, p.x-hw/2, hy, hw, hh, 3);
  ctx.fill();

  // Paddle face
  ctx.beginPath();
  ctx.ellipse(p.x, p.y, p.w/2, p.h*2.2, 0, 0, Math.PI*2);
  const fg = ctx.createRadialGradient(p.x-8, p.y-4, 2, p.x, p.y, p.w/2);
  fg.addColorStop(0, faceColor);
  fg.addColorStop(1, rimColor);
  ctx.fillStyle = fg;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 2; ctx.stroke();

  // Shine
  ctx.beginPath();
  ctx.ellipse(p.x - p.w*0.15, p.y - p.h*0.6, p.w*0.2, p.h*0.8, -0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fill();
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawBall() {
  // Trail
  for (let i = 0; i < trailPositions.length; i++) {
    const t = trailPositions[i];
    const alpha = (i / trailPositions.length) * 0.3;
    const size = ball.r * (0.4 + 0.6 * i / trailPositions.length);
    ctx.beginPath();
    ctx.arc(t.x, t.y, size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(251,191,36,${alpha})`;
    ctx.fill();
  }

  // Shadow
  ctx.beginPath();
  ctx.ellipse(ball.x+3, ball.y+4, ball.r, ball.r*0.6, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fill();

  // Ball
  const bg = ctx.createRadialGradient(ball.x-3, ball.y-3, 1, ball.x, ball.y, ball.r);
  bg.addColorStop(0,'#fde68a'); bg.addColorStop(0.7,'#fbbf24'); bg.addColorStop(1,'#f59e0b');
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle = bg; ctx.fill();
  ctx.strokeStyle = '#e8930c'; ctx.lineWidth = 1.2; ctx.stroke();

  // Shine
  ctx.beginPath();
  ctx.arc(ball.x-3, ball.y-3, ball.r*0.28, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fill();
}

// --- Input ---
let pointerX = W / 2;
function onPtr(e) {
  pointerX = e.touches ? e.touches[0].clientX : e.clientX;
}
canvas.addEventListener('mousemove', onPtr);
canvas.addEventListener('touchmove', onPtr, {passive:true});
canvas.addEventListener('touchstart', onPtr, {passive:true});

// --- Menu ---
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    difficulty = btn.dataset.diff;
  });
});

document.getElementById('playBtn').addEventListener('click', startGame);
document.getElementById('replayBtn').addEventListener('click', startGame);
document.getElementById('menuBtn').addEventListener('click', () => {
  gameOverEl.classList.add('hidden');
  menuEl.classList.remove('hidden');
  gameState = 'menu';
});
document.getElementById('pauseBtn').addEventListener('click', () => {
  if (gameState === 'playing') {
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸';
  }
});
document.getElementById('homeBtn').addEventListener('click', () => {
  gameState = 'menu';
  paused = false;
  hudEl.classList.add('hidden');
  menuEl.classList.remove('hidden');
});

function startGame() {
  menuEl.classList.add('hidden');
  gameOverEl.classList.add('hidden');
  hudEl.classList.remove('hidden');
  document.getElementById('diffLabel').textContent = difficulty.toUpperCase();
  paused = false;
  document.getElementById('pauseBtn').textContent = '⏸';
  gameState = 'playing';
  initGame();
}

// --- Update ---
function update() {
  if (gameState !== 'playing' || paused) return;

  // Player paddle
  paddle.x += (pointerX - paddle.x) * 0.14;
  paddle.x = Math.max(paddle.w/2, Math.min(W - paddle.w/2, paddle.x));

  // CPU AI
  const cpuTarget = ball.vy < 0 ? ball.x + cpuTargetOffset : W/2;
  cpuPaddle.x += (cpuTarget - cpuPaddle.x) * conf.cpuSpeed;
  cpuPaddle.x = Math.max(cpuPaddle.w/2, Math.min(W - cpuPaddle.w/2, cpuPaddle.x));

  // Trail
  trailPositions.push({x: ball.x, y: ball.y});
  if (trailPositions.length > 8) trailPositions.shift();

  // Ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Walls
  if (ball.x < ball.r) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x > W - ball.r) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }

  // Player hit
  if (ball.vy > 0 && ball.y + ball.r >= paddle.y - 16 && ball.y < paddle.y + 10 &&
      Math.abs(ball.x - paddle.x) < paddle.w/2 + 8) {
    ball.vy = -(Math.abs(ball.vy) + conf.ballAccel);
    ball.vx += (ball.x - paddle.x) * 0.1;
    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    if (spd > conf.maxSpeed) { ball.vx *= conf.maxSpeed/spd; ball.vy *= conf.maxSpeed/spd; }
    streak++;
    cpuTargetOffset = (Math.random()-0.5) * conf.cpuError;
    spawnParticles(ball.x, ball.y, '#f97316');
    if (streak === 3) showCombo('🔥 Nice Rally!');
    if (streak === 5) showCombo('⚡ On Fire!');
    if (streak >= 7) showCombo('💥 UNSTOPPABLE!');
  }

  // CPU hit
  if (ball.vy < 0 && ball.y - ball.r <= cpuPaddle.y + 14 && ball.y > cpuPaddle.y - 10 &&
      Math.abs(ball.x - cpuPaddle.x) < cpuPaddle.w/2 + 8) {
    ball.vy = Math.abs(ball.vy) + conf.ballAccel;
    ball.vx += (ball.x - cpuPaddle.x) * 0.07;
    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    if (spd > conf.maxSpeed) { ball.vx *= conf.maxSpeed/spd; ball.vy *= conf.maxSpeed/spd; }
    spawnParticles(ball.x, ball.y, '#3b82f6');
  }

  // Score
  if (ball.y < -20) {
    playerScore++;
    updateHUD();
    spawnParticles(W/2, 30, '#fbbf24');
    if (playerScore >= MAX_SCORE) return endGame(true);
    resetBall(1);
  }
  if (ball.y > H + 20) {
    cpuScore++;
    updateHUD();
    if (cpuScore >= MAX_SCORE) return endGame(false);
    resetBall(-1);
  }
}

function endGame(won) {
  gameState = 'over';
  hudEl.classList.add('hidden');
  document.getElementById('goEmoji').textContent = won ? '🎉' : '😢';
  document.getElementById('goTitle').textContent = won ? 'You Win!' : 'You Lose';
  document.getElementById('goScore').textContent = `${playerScore} — ${cpuScore}`;
  gameOverEl.classList.remove('hidden');
}

function draw() {
  drawBg();
  drawClouds();
  drawTable();
  drawPaddleShape(cpuPaddle, '#60a5fa', '#2563eb', false);
  drawPaddleShape(paddle, '#fb923c', '#ea580c', true);
  if (gameState === 'playing') drawBall();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
