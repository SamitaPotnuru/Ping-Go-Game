<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ping Pong Go!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: linear-gradient(180deg, #f7a832 0%, #f0c96e 30%, #a8d8f0 60%, #e8a0c8 100%); font-family: 'Segoe UI', sans-serif; }
canvas { display: block; margin: 0 auto; touch-action: none; }
#ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.score { position: absolute; bottom: 20px; font-size: 48px; font-weight: 900; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
.score.left { left: 30px; }
.score.right { right: 30px; }
.score .icon { font-size: 36px; margin-right: 6px; }
#message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 36px; font-weight: 900; color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,0.4); text-align: center; display: none; pointer-events: auto; cursor: pointer; }
#stars { position: absolute; top: 15px; width: 100%; text-align: center; font-size: 40px; color: rgba(255,255,255,0.5); text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
#stars .earned { color: #fff; }
#pauseBtn { position: absolute; top: 15px; right: 15px; width: 48px; height: 48px; border-radius: 50%; background: rgba(0,0,0,0.3); border: 3px solid #fff; color: #fff; font-size: 22px; cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="stars"><span id="star1">☆</span><span id="star2">☆</span></div>
  <button id="pauseBtn">⏸</button>
  <div class="score left"><span class="icon">🏆</span><span id="playerScore">00</span></div>
  <div class="score right"><span class="icon">💎</span><span id="cpuScore">00</span></div>
  <div id="message">🏓 Tap to Start!</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('message');
const playerScoreEl = document.getElementById('playerScore');
const cpuScoreEl = document.getElementById('cpuScore');
const star1 = document.getElementById('star1');
const star2 = document.getElementById('star2');
const pauseBtn = document.getElementById('pauseBtn');

let W, H, dpr;
let paused = false;
let gameState = 'idle'; // idle, playing, point, gameover

// Game objects
let ball, paddle, cpuPaddle;
let playerScore = 0, cpuScore = 0;
let ballSpeed;
const MAX_SCORE = 5;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

function initGame() {
  playerScore = 0; cpuScore = 0;
  updateScores();
  resetBall();
}

function resetBall() {
  ballSpeed = 5;
  ball = { x: W / 2, y: H / 2 - 40, vx: (Math.random() > 0.5 ? 1 : -1) * 3, vy: -ballSpeed, r: 10 };
  paddle = { x: W / 2, y: H - 80, w: 100, h: 14, r: 7 };
  cpuPaddle = { x: W / 2, y: 90, w: 90, h: 12, r: 6 };
}

function updateScores() {
  playerScoreEl.textContent = String(playerScore).padStart(2, '0');
  cpuScoreEl.textContent = String(cpuScore).padStart(2, '0');
  star1.className = playerScore >= 2 ? 'earned' : '';
  star2.className = playerScore >= 4 ? 'earned' : '';
}

// Table drawing (3D perspective)
function drawTable() {
  ctx.save();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.moveTo(W * 0.12, H * 0.55);
  ctx.lineTo(W * 0.88, H * 0.55);
  ctx.lineTo(W * 0.7, H * 0.2);
  ctx.lineTo(W * 0.3, H * 0.2);
  ctx.closePath();
  ctx.fill();

  // Table top
  const grad = ctx.createLinearGradient(0, H * 0.2, 0, H * 0.55);
  grad.addColorStop(0, '#2dd4bf');
  grad.addColorStop(1, '#06b6d4');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(W * 0.15, H * 0.52);
  ctx.lineTo(W * 0.85, H * 0.52);
  ctx.lineTo(W * 0.68, H * 0.22);
  ctx.lineTo(W * 0.32, H * 0.22);
  ctx.closePath();
  ctx.fill();

  // Border
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Center line
  ctx.beginPath();
  ctx.moveTo(W * 0.5, H * 0.22);
  ctx.lineTo(W * 0.5, H * 0.52);
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Net
  ctx.fillStyle = 'rgba(100,100,100,0.6)';
  ctx.fillRect(W * 0.28, H * 0.365, W * 0.44, 4);
  // Net posts
  ctx.fillStyle = '#555';
  ctx.fillRect(W * 0.28 - 3, H * 0.355, 6, 20);
  ctx.fillRect(W * 0.72 - 3, H * 0.355, 6, 20);

  // Table sides
  ctx.fillStyle = '#d4d4d4';
  ctx.beginPath();
  ctx.moveTo(W * 0.15, H * 0.52);
  ctx.lineTo(W * 0.85, H * 0.52);
  ctx.lineTo(W * 0.85, H * 0.55);
  ctx.lineTo(W * 0.15, H * 0.55);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

// Draw paddle (racket shape)
function drawPaddle(p, color, isPlayer) {
  ctx.save();
  // Handle
  ctx.fillStyle = '#c47a34';
  const handleW = 8, handleH = isPlayer ? 35 : 25;
  ctx.fillRect(p.x - handleW / 2, isPlayer ? p.y + p.h / 2 : p.y - handleH - p.h / 2, handleW, handleH);

  // Paddle face
  ctx.beginPath();
  ctx.ellipse(p.x, p.y, p.w / 2, p.h * 2, 0, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

function drawBall() {
  ctx.save();
  // Shadow
  ctx.beginPath();
  ctx.ellipse(ball.x + 3, ball.y + 3, ball.r, ball.r * 0.7, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fill();
  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = '#fbbf24';
  ctx.fill();
  ctx.strokeStyle = '#f59e0b';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Shine
  ctx.beginPath();
  ctx.arc(ball.x - 3, ball.y - 3, ball.r * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();
  ctx.restore();
}

// Clouds
const clouds = [];
for (let i = 0; i < 8; i++) {
  clouds.push({ x: Math.random() * 1400, y: Math.random() * 300 + (i < 4 ? 0 : H - 200), s: 0.5 + Math.random() * 0.8, speed: 0.2 + Math.random() * 0.3, color: i < 4 ? 'rgba(255,220,150,0.3)' : 'rgba(230,160,200,0.25)' });
}
function drawClouds() {
  clouds.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(c.s, c.s);
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.arc(0, 0, 50, 0, Math.PI * 2);
    ctx.arc(40, -10, 35, 0, Math.PI * 2);
    ctx.arc(-35, 5, 40, 0, Math.PI * 2);
    ctx.arc(20, 15, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    c.x += c.speed;
    if (c.x > W + 100) c.x = -150;
  });
}

// Input
let pointerX = W / 2;
function onPointer(e) {
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  pointerX = clientX;
}
canvas.addEventListener('mousemove', onPointer);
canvas.addEventListener('touchmove', onPointer, { passive: true });
canvas.addEventListener('touchstart', onPointer, { passive: true });

msg.addEventListener('click', () => {
  if (gameState === 'idle' || gameState === 'gameover') {
    gameState = 'playing';
    initGame();
    msg.style.display = 'none';
  }
});

pauseBtn.addEventListener('click', () => {
  if (gameState === 'playing') {
    paused = !paused;
    pauseBtn.textContent = paused ? '▶' : '⏸';
  }
});

function update() {
  if (gameState !== 'playing' || paused) return;

  // Player paddle follows mouse/touch
  paddle.x += (pointerX - paddle.x) * 0.15;
  paddle.x = Math.max(paddle.w / 2, Math.min(W - paddle.w / 2, paddle.x));

  // CPU paddle AI
  const cpuTarget = ball.vy < 0 ? ball.x : W / 2;
  const cpuSpeed = 0.04 + (cpuScore >= 3 ? 0.02 : 0);
  cpuPaddle.x += (cpuTarget - cpuPaddle.x) * cpuSpeed;
  cpuPaddle.x = Math.max(cpuPaddle.w / 2, Math.min(W - cpuPaddle.w / 2, cpuPaddle.x));

  // Ball movement
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounce
  if (ball.x < ball.r || ball.x > W - ball.r) {
    ball.vx *= -1;
    ball.x = Math.max(ball.r, Math.min(W - ball.r, ball.x));
  }

  // Player paddle collision
  if (ball.vy > 0 && ball.y + ball.r >= paddle.y - 15 && ball.y < paddle.y + 10 &&
      ball.x > paddle.x - paddle.w / 2 - 5 && ball.x < paddle.x + paddle.w / 2 + 5) {
    ball.vy = -Math.abs(ball.vy) - 0.3;
    ball.vx += (ball.x - paddle.x) * 0.08;
    ballSpeed = Math.min(ballSpeed + 0.2, 12);
  }

  // CPU paddle collision
  if (ball.vy < 0 && ball.y - ball.r <= cpuPaddle.y + 15 && ball.y > cpuPaddle.y - 10 &&
      ball.x > cpuPaddle.x - cpuPaddle.w / 2 - 5 && ball.x < cpuPaddle.x + cpuPaddle.w / 2 + 5) {
    ball.vy = Math.abs(ball.vy) + 0.3;
    ball.vx += (ball.x - cpuPaddle.x) * 0.06;
    ballSpeed = Math.min(ballSpeed + 0.2, 12);
  }

  // Score
  if (ball.y < -20) {
    playerScore++;
    updateScores();
    checkGameOver();
    resetBall();
    ball.vy = Math.abs(ball.vy);
  }
  if (ball.y > H + 20) {
    cpuScore++;
    updateScores();
    checkGameOver();
    resetBall();
    ball.vy = -Math.abs(ball.vy);
  }
}

function checkGameOver() {
  if (playerScore >= MAX_SCORE || cpuScore >= MAX_SCORE) {
    gameState = 'gameover';
    msg.innerHTML = playerScore >= MAX_SCORE ? '🎉 You Win!<br><small>Tap to play again</small>' : '😢 You Lose<br><small>Tap to play again</small>';
    msg.style.display = 'block';
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawClouds();
  drawTable();
  drawPaddle(cpuPaddle, '#3b82f6', false);
  drawPaddle(paddle, '#f97316', true);
  if (gameState === 'playing' || gameState === 'point') drawBall();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start
msg.style.display = 'block';
initGame();
loop();
</script>
</body>
</html>
